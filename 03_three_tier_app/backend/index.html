<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #app {
      width: 100%;
      max-width: 640px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    header {
      background: #0f3460;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; letter-spacing: 1px; }

    #status {
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 12px;
      background: #e94560;
    }
    #status.ok { background: #06d6a0; color: #000; }

    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px;
    }

    #login-screen h2 { margin-bottom: 8px; }

    #login-screen input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 8px;
      border: none;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 1rem;
    }

    #login-screen button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #e94560;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    #login-screen button:hover { background: #c73652; }

    #chat-screen {
      flex: 1;
      display: none;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: #0f3460 transparent;
    }

    .message {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .message .meta {
      font-size: 0.7rem;
      opacity: 0.6;
      margin-bottom: 4px;
    }

    .message.mine {
      align-self: flex-end;
      background: #0f3460;
      border-bottom-right-radius: 4px;
    }

    .message.other {
      align-self: flex-start;
      background: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    #input-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #0f3460;
    }

    #input-bar input {
      flex: 1;
      padding: 10px 16px;
      border-radius: 24px;
      border: none;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
    }

    #input-bar button {
      padding: 10px 20px;
      border-radius: 24px;
      border: none;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s;
    }
    #input-bar button:hover { background: #c73652; }
    #input-bar button:disabled { background: #555; cursor: default; }

    #clear-btn {
      background: none;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 4px 8px;
    }
    #clear-btn:hover { color: #e94560; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <h1>💬 Chat App</h1>
    <span id="status">offline</span>
  </header>

  <div id="login-screen">
    <h2>Podaj swój nick</h2>
    <input id="username-input" type="text" placeholder="np. jankowalski" maxlength="30" />
    <button id="join-btn">Dołącz do czatu</button>
  </div>

  <div id="chat-screen">
    <div id="messages"></div>
    <div id="input-bar">
      <input id="msg-input" type="text" placeholder="Napisz wiadomość..." maxlength="500" />
      <button id="send-btn">Wyślij</button>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  const POLL_INTERVAL = 2000;

  let currentUser = null;
  let pollTimer = null;
  let lastCount = 0;

  const statusEl = document.getElementById('status');
  const loginScreen = document.getElementById('login-screen');
  const chatScreen = document.getElementById('chat-screen');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');
  const usernameInput = document.getElementById('username-input');
  const joinBtn = document.getElementById('join-btn');

  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      if (res.ok) {
        statusEl.textContent = 'online';
        statusEl.classList.add('ok');
      } else throw new Error();
    } catch {
      statusEl.textContent = 'offline';
      statusEl.classList.remove('ok');
    }
  }

  async function fetchMessages() {
    try {
      const res = await fetch(`${API}/messages`);
      if (!res.ok) return;
      const msgs = await res.json();
      if (msgs.length !== lastCount) {
        lastCount = msgs.length;
        renderMessages(msgs);
      }
    } catch { /* silent */ }
  }

  function renderMessages(msgs) {
    const atBottom = messagesEl.scrollHeight - messagesEl.scrollTop <= messagesEl.clientHeight + 50;
    messagesEl.innerHTML = '';
    msgs.forEach(m => {
      const div = document.createElement('div');
      div.className = 'message ' + (m.user === currentUser ? 'mine' : 'other');
      const time = new Date(m.timestamp * 1000).toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `<div class="meta">${escapeHtml(m.user)} · ${time}</div>${escapeHtml(m.text)}`;
      messagesEl.appendChild(div);
    });
    if (atBottom) messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    try {
      await fetch(`${API}/messages`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user: currentUser, text }),
      });
      msgInput.value = '';
      await fetchMessages();
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  joinBtn.addEventListener('click', () => {
    const name = usernameInput.value.trim();
    if (!name) return;
    currentUser = name;
    loginScreen.style.display = 'none';
    chatScreen.style.display = 'flex';
    fetchMessages();
    pollTimer = setInterval(fetchMessages, POLL_INTERVAL);
    msgInput.focus();
  });

  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinBtn.click(); });
  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  checkHealth();
  setInterval(checkHealth, 10000);
</script>
</body>
</html>
